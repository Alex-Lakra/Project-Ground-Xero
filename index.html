<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project Ground Xero</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Geist:wght@300;400;500;600;700&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=block" rel="stylesheet">
</head>

<body style="background-color: #0c0f0f; color: #e9bcb9; margin: 0; padding: 0;">
  <div id="root">
    <!-- Fallback styling to avoid white flash before bundle is ready -->
    <style>
      .initial-loader {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background-color: #0c0f0f;
        font-family: 'JetBrains Mono', monospace;
        color: #e9bcb9;
        z-index: 9999;
        text-align: center;
      }

      .initial-loader-title {
        font-size: 1.25rem;
        font-weight: bold;
        letter-spacing: 0.3em;
        text-transform: uppercase;
        animation: initial-blink 1.5s ease-in-out infinite;
      }

      @keyframes initial-blink {

        0%,
        100% {
          opacity: 0.3;
        }

        50% {
          opacity: 1;
        }
      }
    </style>
    <div class="initial-loader">
      <div class="initial-loader-title">Entering the Matrix...</div>
    </div>
  </div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
